<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¿Quién es ese personaje?</title>
  <link rel="stylesheet" href="Mudae_Characters/style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="badge">Adivina los personajes</div>
      <h1>¿Quién es ese personaje?</h1>
      <p>Escribe el nombre correcto debajo de cada silueta. Cuando aciertes, el cuadro se pondrá en verde y quedará bloqueado.</p>
      <div class="counter" id="counter">0 / 9 correctos</div>
    </section>

    <section class="grid" id="grid" aria-label="Juego de personajes"></section>

    <section class="next-wrap" id="nextWrap" hidden>
      <a class="next-btn" href="2.html">SIGUIENTE</a>
    </section>
  </main>

  <script>
    const characters = [
      { file: "Jake.png", name: "Jake" },
      { file: "HexManiac.png", name: "HexManiac" },
      { file: "Yosafire.png", name: "Yosafire" },
      { file: "AoiTodo.png", name: "AoiTodo" },
      { file: "Beelzebub.png", name: "Beelzebub" },
      { file: "CelestiaLudenberg.png", name: "CelestiaLudenberg" },
      { file: "Gregor.png", name: "Gregor" },
      { file: "MamiTomoe.png", name: "MamiTomoe" },
      { file: "Charlotte.png", name: "Charlotte" },
    ];

    const normalize = (value) =>
      value
        .toLowerCase()
        .trim()
        .replace(/\s+/g, "")
        .replace(/[áàäâ]/g, "a")
        .replace(/[éèëê]/g, "e")
        .replace(/[íìïî]/g, "i")
        .replace(/[óòöô]/g, "o")
        .replace(/[úùüû]/g, "u")
        .replace(/[^a-z0-9]/g, "");

    const grid = document.getElementById("grid");
    const counter = document.getElementById("counter");
    const nextWrap = document.getElementById("nextWrap");
    let correctCount = 0;

    function updateCounter() {
      counter.textContent = `${correctCount} / ${characters.length} correctos`;
      if (correctCount === characters.length) {
        nextWrap.hidden = false;
        nextWrap.classList.add("show");
      }
    }

    characters.forEach((character, index) => {
      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="silhouette">
          <img src="Mudae_Characters/${character.file}" alt="${character.name}" draggable="false">
        </div>
        <label class="sr-only" for="input-${index}">Nombre del personaje ${index + 1}</label>
        <input
          id="input-${index}"
          class="guess"
          type="text"
          inputmode="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Escribe el nombre..."
          data-answer="${character.name}"
        />
        <div class="result" id="result-${index}">Pendiente</div>
      `;

      const input = card.querySelector(".guess");
      const result = card.querySelector(".result");

      input.addEventListener("input", () => {
        const answer = normalize(input.dataset.answer);
        const typed = normalize(input.value);

        if (typed && typed === answer) {
          input.classList.add("correct");
          input.disabled = true;
          result.textContent = "¡Correcto!";
          result.classList.add("correct");
          correctCount += 1;
          updateCounter();
        }
      });

      grid.appendChild(card);
    });

    updateCounter();
  </script>
</body>
</html>
